<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethelia & Eldoria | Interactive Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --bg-card: #161616;
            --accent-gold: #d4af37;
            --accent-red: #d32f2f;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        .header-banner {
            text-align: center;
            margin-bottom: 25px;
            font-family: 'Montserrat', sans-serif;
        }

        .header-banner h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .header-banner p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Map Container Setup */
        .map-wrapper {
            position: relative;
            max-width: 1200px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.95);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(212, 175, 55, 0.15);
        }

        .map-image {
            width: 100%;
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Generic Hotspot Overlay Settings */
        .map-hotspot {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            border-radius: 50%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Visual response on hover for region hotspots */
        .map-hotspot:hover {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px 5px rgba(212, 175, 55, 0.4);
            backdrop-filter: blur(1px);
        }

        /* Specific Coordinates Map Coordinates Based on the Image Layout */
        .hotspot-compass {
            top: 11%; left: 81%; width: 12%; height: 25%;
            border-radius: 50%;
        }
        .hotspot-iron-kingdoms {
            top: 21%; left: 22%; width: 14%; height: 18%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }
        .hotspot-valoria-forests {
            top: 18%; left: 41%; width: 18%; height: 17%;
            border-radius: 40%;
        }
        .hotspot-arcanum-desert {
            top: 20%; left: 61%; width: 18%; height: 26%;
            border-radius: 50% 40% 40% 50%;
        }
        .hotspot-sylvaris-jungles {
            top: 72%; left: 36%; width: 25%; height: 20%;
            border-radius: 20px;
        }
        .hotspot-sunstone-empire {
            top: 67%; left: 62%; width: 14%; height: 19%;
            border-radius: 40%;
        }
        .hotspot-kraken {
            top: 72%; left: 9%; width: 10%; height: 16%;
        }

        /* Pop-out Card Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popout-card {
            background-color: var(--bg-card);
            border: 2px solid var(--accent-gold);
            width: 90%;
            max-width: 500px;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 0 20px rgba(212,175,55,0.05);
            text-align: center;
            transform: scale(0.7) translateY(30px);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .modal-overlay.active .popout-card {
            transform: scale(1) translateY(0);
        }

        .popout-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 12px;
        }

        .popout-card p {
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .popout-card .status-tag {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 16px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .close-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 10px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: var(--text-main);
            color: var(--bg-dark);
            border-color: var(--text-main);
        }

        /* Toast Alert Settings */
        .toast {
            position: fixed;
            bottom: -100px;
            background-color: rgba(20, 20, 20, 0.98);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            padding: 15px 30px;
            border-left: 4px solid var(--accent-red);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 2000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            pointer-events: none;
            text-transform: uppercase;
        }

        .toast.show {
            bottom: 40px;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>The Chronicles of Aethelia & Eldoria</h1>
        <p>Interact with the map regions to explore their lore, or locate the Compass to access the core terminal.</p>
    </div>

    <div class="map-wrapper" id="mapWrapper">
        <img src="Gemini_Generated_Image_pq3s5apq3s5apq3s.png" alt="World Map" class="map-image">
        
        <a href="prototype3.html" class="map-hotspot hotspot-compass" id="compassLink" title="Navigate to Core Operations Blueprint"></a>

        <div class="map-hotspot hotspot-iron-kingdoms" data-region="iron-kingdoms"></div>
        <div class="map-hotspot hotspot-valoria-forests" data-region="valoria-forests"></div>
        <div class="map-hotspot hotspot-arcanum-desert" data-region="arcanum-desert"></div>
        <div class="map-hotspot hotspot-sylvaris-jungles" data-region="sylvaris-jungles"></div>
        <div class="map-hotspot hotspot-sunstone-empire" data-region="sunstone-empire"></div>
        <div class="map-hotspot hotspot-kraken" data-region="kraken"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="popout-card">
            <div class="status-tag" id="popoutStatus">Region Discovered</div>
            <h2 id="popoutTitle">Region Title</h2>
            <p id="popoutDescription">Region detailed lore description goes here...</p>
            <button class="close-btn" id="closeModal">Return to Map</button>
        </div>
    </div>

    <div id="toast" class="toast">Page not ready yet... Uncharted Territory!</div>

    <script>
        // Content Data Matrix for Map Regions
        const regionData = {
            "iron-kingdoms": {
                title: "The Iron Kingdoms",
                status: "Strategic Alliance",
                desc: "A industrial powerhouse forged within deep jagged mountains. Home to ancient dwarven blacksmiths, massive volcanic foundries, and heavily fortified stone strongholds."
            },
            "valoria-forests": {
                title: "Whispering Forests of Valoria",
                status: "Magical Domain",
                desc: "An enchanted woodland completely cloaked in timeless twilight. Legends claim the trees whisper warnings to elven pathfinders, and the paths rewrite themselves to trap uninvited invaders."
            },
            "arcanum-desert": {
                title: "The Desert of Arcanum",
                status: "High Danger Zone",
                desc: "A vast sea of shifting shimmering sands concealing buried spell-towers and crystalline anomalies. Scorched by intense wild magic storms that distort time itself."
            },
            "sylvaris-jungles": {
                title: "The Wild Jungles of Sylvaris",
                status: "Uncharted Territory",
                desc: "A primeval rainforest teeming with giant predators, prehistoric ruins, and toxic swamp bogs. Very few expeditions sent here ever return to Eldoria."
            },
            "sunstone-empire": {
                title: "The Empire of Sunstone",
                status: "Capital Province",
                desc: "A prosperous empire decorated with golden spires and grand architectural coastal ports. Powered completely by solar monuments dedicated to eternal light."
            },
            "kraken": {
                title: "The Sunken Sea Lair",
                status: "Boss Threat Level",
                desc: "The dark maritime depths ruled by the legendary Kraken. Hundreds of missing merchant fleets lie shattered on the ocean floor here."
            }
        };

        const mapWrapper = document.getElementById('mapWrapper');
        const modalOverlay = document.getElementById('modalOverlay');
        const closeModal = document.getElementById('closeModal');
        const toast = document.getElementById('toast');
        let toastTimeout;

        // Interactive Interface Event Controller
        mapWrapper.addEventListener('click', function(e) {
            // 1. If Compass link is selected, let the anchor load prototype3.html naturally
            if (e.target.closest('#compassLink')) {
                return;
            }
            
            // 2. If an interactive custom map region hotspot is clicked
            const hotspot = e.target.closest('[data-region]');
            if (hotspot) {
                const regionKey = hotspot.getAttribute('data-region');
                const data = regionData[regionKey];
                
                if (data) {
                    // Inject database details into the visual popout card structures
                    document.getElementById('popoutTitle').innerText = data.title;
                    document.getElementById('popoutStatus').innerText = data.status;
                    document.getElementById('popoutDescription').innerText = data.desc;
                    
                    // Activate Popout window
                    modalOverlay.classList.add('active');
                    return;
                }
            }
            
            // 3. Fallback default: trigger standard toast notice when hitting empty map zones
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        });

        // Close Pop-out Module Action
        closeModal.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        // Also allow closing the card by clicking anywhere outside of it
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
    </script>
</body>
</html>
